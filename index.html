<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline AI Chat</title>
</head>
<body>
    <h1>Offline AI Chat</h1>

    <div id="chat"></div>

    <input id="prompt" type="text" placeholder="Type a message..." size="50">
    <button id="send">Send</button>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers';

        const chat = document.getElementById('chat');
        const promptBox = document.getElementById('prompt');
        const sendButton = document.getElementById('send');

        chat.innerHTML = '<p>Loading AI model...</p>';

        const generator = await pipeline(
            'text-generation',
            'Xenova/distilgpt2'
        );

        chat.innerHTML = '<p><b>System:</b> Model loaded.</p>';

        let history = '';

        sendButton.onclick = async () => {
            const userMessage = promptBox.value.trim();
            if (!userMessage) return;

            chat.innerHTML += `<p><b>You:</b> ${userMessage}</p>`;
            promptBox.value = '';

            history += `User: ${userMessage}\nAssistant:`;

            try {
                const result = await generator(history, {
                    max_new_tokens: 50,
                    temperature: 0.8,
                    do_sample: true
                });

                let generated = result[0].generated_text;

                let reply = generated.substring(history.length);

                const stopTokens = ['User:', '\n\n'];
                for (const token of stopTokens) {
                    const index = reply.indexOf(token);
                    if (index !== -1) {
                        reply = reply.substring(0, index);
                    }
                }

                reply = reply.trim();

                if (!reply) {
                    reply = "I couldn't generate a response.";
                }

                chat.innerHTML += `<p><b>AI:</b> ${reply}</p>`;

                history += ` ${reply}\n`;

            } catch (err) {
                console.error(err);
                chat.innerHTML += `<p><b>Error:</b> ${err.message}</p>`;
            }
        };

        promptBox.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendButton.click();
            }
        });
    </script>
</body>
</html>
