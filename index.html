<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #111827;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

#header {
    padding: 15px;
    border-bottom: 1px solid #333;
    font-weight: bold;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.message {
    margin-bottom: 15px;
    max-width: 80%;
    padding: 12px;
    border-radius: 12px;
    word-wrap: break-word;
}

.user {
    background: #2563eb;
    margin-left: auto;
}

.ai {
    background: #374151;
}

.system {
    background: #065f46;
}

#inputArea {
    display: flex;
    padding: 15px;
    border-top: 1px solid #333;
    gap: 10px;
}

#prompt {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="header">Offline AI Chat</div>

<div id="chat"></div>

<div id="inputArea">
    <input id="prompt" placeholder="Message AI...">
    <button id="send">Send</button>
</div>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

const chat = document.getElementById("chat");
const prompt = document.getElementById("prompt");
const send = document.getElementById("send");

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

let engine;

addMessage("Loading AI model...", "system");

const models = [
    "Llama-3.2-1B-Instruct-q4f16_1-MLC",
    "Qwen2.5-0.5B-Instruct-q4f16_1-MLC"
];

for (const model of models) {
    try {
        engine = new webllm.MLCEngine();

        addMessage(`Trying ${model}...`, "system");

        await engine.reload(model);

        addMessage(`Loaded ${model}`, "system");
        break;

    } catch (err) {
        console.error(err);
        addMessage(`${model} failed`, "system");
    }
}

if (!engine) {
    addMessage(
        "Could not load any model. Device may not support WebGPU or may not have enough memory.",
        "system"
    );
}

const messages = [
{
    role: "system",
    content: "You are a helpful AI assistant. Give concise but useful answers."
}
];

async function sendMessage() {

    const text = prompt.value.trim();

    if (!text || !engine) return;

    addMessage(text, "user");

    prompt.value = "";

    messages.push({
        role: "user",
        content: text
    });

    const thinking = addMessage("Thinking...", "ai");

    try {

        const response =
            await engine.chat.completions.create({
                messages,
                temperature: 0.7,
                max_tokens: 250
            });

        const reply =
            response.choices[0].message.content;

        thinking.textContent = reply;

        messages.push({
            role: "assistant",
            content: reply
        });

    } catch (err) {

        console.error(err);

        thinking.textContent =
            "Error: " + err.message;
    }
}

send.onclick = sendMessage;

prompt.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
