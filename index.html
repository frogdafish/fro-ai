<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline AI Chat</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
}

#header{
    padding:15px;
    border-bottom:1px solid #333;
    font-size:20px;
    font-weight:bold;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:80%;
    margin-bottom:15px;
    padding:12px;
    border-radius:12px;
    white-space:pre-wrap;
    word-wrap:break-word;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.ai{
    background:#374151;
}

.system{
    background:#065f46;
}

#inputArea{
    display:flex;
    gap:10px;
    padding:15px;
    border-top:1px solid #333;
}

#prompt{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}
</style>
</head>
<body>

<div id="header">Offline AI Chat</div>

<div id="chat"></div>

<div id="inputArea">
    <input
        id="prompt"
        type="text"
        placeholder="Message AI..."
        autocomplete="off"
    >
    <button id="send">Send</button>
    <button id="continue">Continue</button>
</div>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

const chat = document.getElementById("chat");
const promptBox = document.getElementById("prompt");
const sendBtn = document.getElementById("send");
const continueBtn = document.getElementById("continue");

function addMessage(text,type){

    const div=document.createElement("div");

    div.className=`message ${type}`;

    div.textContent=text;

    chat.appendChild(div);

    chat.scrollTop=chat.scrollHeight;

    return div;
}

let engine=null;

addMessage("Loading AI...","system");

const models=[
    "Llama-3.2-1B-Instruct-q4f16_1-MLC",
    "Qwen2.5-0.5B-Instruct-q4f16_1-MLC"
];

for(const model of models){

    try{

        addMessage(`Trying ${model}`,"system");

        engine=new webllm.MLCEngine();

        await engine.reload(model);

        addMessage(`Loaded ${model}`,"system");

        break;

    }catch(err){

        console.error(err);

        addMessage(`${model} failed`,"system");
    }
}

if(!engine){

    addMessage(
        "No compatible AI model could be loaded.",
        "system"
    );
}

const messages=[
{
    role:"system",
    content:
`You are a helpful AI assistant.

Give detailed answers when appropriate.

Finish your thoughts completely.

Do not abruptly stop in the middle of an explanation.

If the user asks for code, provide complete code.

If the user asks for instructions, provide all steps clearly.`
}
];

async function generateResponse(){

    try{

        const response=
            await engine.chat.completions.create({
                messages,
                temperature:0.7,
                top_p:0.95,
                max_tokens:1024
            });

        return response
            .choices[0]
            .message
            .content;

    }catch(err){

        console.error(err);

        throw err;
    }
}

async function sendMessage(){

    if(!engine) return;

    const text=promptBox.value.trim();

    if(!text) return;

    addMessage(text,"user");

    promptBox.value="";

    messages.push({
        role:"user",
        content:text
    });

    const thinking=
        addMessage("Thinking...","ai");

    try{

        const reply=
            await generateResponse();

        thinking.textContent=reply;

        messages.push({
            role:"assistant",
            content:reply
        });

    }catch(err){

        thinking.textContent=
            "Error: "+err.message;
    }
}

async function continueResponse(){

    if(!engine) return;

    messages.push({
        role:"user",
        content:
        "Continue your previous response from where you left off."
    });

    const thinking=
        addMessage("Continuing...","ai");

    try{

        const reply=
            await generateResponse();

        thinking.textContent=reply;

        messages.push({
            role:"assistant",
            content:reply
        });

    }catch(err){

        thinking.textContent=
            "Error: "+err.message;
    }
}

sendBtn.onclick=sendMessage;

continueBtn.onclick=continueResponse;

promptBox.addEventListener(
    "keydown",
    e=>{
        if(e.key==="Enter"){
            sendMessage();
        }
    }
);
</script>

</body>
</html>
